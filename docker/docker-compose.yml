version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: volta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       voltadb
      POSTGRES_USER:     volta
      POSTGRES_PASSWORD: volta
    ports:
      - "5433:5432"
    volumes:
      - volta-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volta -d voltadb"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: volta-pgadmin
    restart: unless-stopped
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@volta.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  volta-pgdata:
